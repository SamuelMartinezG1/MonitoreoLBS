# docker-compose.yml — UPS Monitoring Service
# Stack 100% PostgreSQL (sin InfluxDB).
#
# Servicios:
#   db          → PostgreSQL 15 (config + telemetría + series de tiempo)
#   monitor     → Servicio Python (SNMP + Modbus + Socket.IO)
#   cloudflared → Cloudflare Tunnel (perfil opcional `tunnel`)
#
# Levantar:    docker compose up -d
# Logs:        docker compose logs -f monitor
# Reconstruir: docker compose build --no-cache monitor
#
# Requiere un archivo .env (ver .env.example).

services:
  # ------------------------------------------------------------------ #
  db:
    image: postgres:15-alpine
    container_name: ups-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-guia_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambiame123}
      POSTGRES_DB: ${DB_NAME:-guia_instalacion}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Las migraciones .sql se aplican en orden alfabético la PRIMERA vez
      # que arranca el contenedor (cuando pgdata está vacío).
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks: [monitor-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-guia_app} -d ${DB_NAME:-guia_instalacion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------ #
  # Servicio principal de monitoreo
  # network_mode: host  →  necesario para alcanzar UPS por SNMP/Modbus
  #                       a través de ZeroTier u otra red overlay del host.
  monitor:
    build: .
    container_name: ups-monitor
    restart: unless-stopped
    network_mode: host
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://${DB_USER:-guia_app}:${DB_PASSWORD:-cambiame123}@127.0.0.1:5432/${DB_NAME:-guia_instalacion}
      SECRET_KEY:   ${SECRET_KEY:-change-me}
      APP_HOST:     0.0.0.0
      APP_PORT:     ${APP_PORT:-5000}
      POLL_INTERVAL: ${POLL_INTERVAL:-2}
      LOG_LEVEL:    ${LOG_LEVEL:-INFO}
      HISTORY_RETENTION_DAYS: ${HISTORY_RETENTION_DAYS:-30}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-90}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${APP_PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------------ #
  # Cloudflare Tunnel — expone el servicio en https://<tu-dominio>
  # docker compose --profile tunnel up -d cloudflared
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ups-monitor-tunnel
    restart: unless-stopped
    network_mode: host
    depends_on:
      - monitor
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_METRICS: 127.0.0.1:9113
    profiles: ["tunnel"]

volumes:
  pgdata:

networks:
  monitor-net:
    driver: bridge
