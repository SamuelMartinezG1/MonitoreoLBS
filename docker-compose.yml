# ============================================================================
# docker-compose.yml — LBS Monitor (portal + DB + tunnel opcional)
# ============================================================================
# Stack 100% PostgreSQL. El portal sirve el nuevo diseño y los endpoints JSON.
#
# Servicios
#   db        → PostgreSQL 15 (config + telemetría)
#   portal    → Flask + Socket.IO + frontend (diseño Claude Design)
#   tunnel    → Cloudflare Tunnel (opt-in con --profile tunnel)
#
# Comandos comunes
#   docker compose up -d                          # arranca db + portal
#   docker compose --profile tunnel up -d         # añade Cloudflare Tunnel
#   docker compose logs -f portal                 # logs en vivo
#   docker compose build --no-cache portal        # rebuild de la imagen
#   docker compose down                           # parar (mantiene volúmenes)
#   docker compose down -v                        # parar y BORRAR datos
#
# Requiere `.env` (basado en `.env.example`).
# ============================================================================

x-restart-policy: &restart unless-stopped

services:

  # ------------------------------------------------------------------ #
  # PostgreSQL                                                          #
  # ------------------------------------------------------------------ #
  db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-lbs}-db
    restart: *restart
    # Postgres LOCAL solo para uso standalone. El despliegue real usa la BD
    # unificada (override monitoreo.override.yml), así que este servicio NO
    # arranca por defecto. Para un stack independiente: `--profile standalone`.
    profiles: ["standalone"]
    environment:
      POSTGRES_USER:     ${DB_USER:-guia_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambiame123}
      POSTGRES_DB:       ${DB_NAME:-guia_instalacion}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Las migraciones .sql se aplican en orden alfabético la PRIMERA vez
      # que arranca el contenedor (cuando pgdata está vacío).
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      # Expuesto solo en localhost para que la admin externa pueda conectar.
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-guia_app} -d ${DB_NAME:-guia_instalacion}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [lbs-net]

  # ------------------------------------------------------------------ #
  # Portal (Flask + Socket.IO + frontend nuevo)                         #
  # ------------------------------------------------------------------ #
  # `network_mode: host` es indispensable para que SNMP/Modbus puedan
  # alcanzar UPS en ZeroTier u otra red overlay del host. Con host mode
  # el portal NO usa `lbs-net`; las apps deben hablar con localhost.
  portal:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PORTAL_IMAGE:-lbs/portal:latest}
    container_name: ${PROJECT_NAME:-lbs}-portal
    restart: *restart
    network_mode: host
    # Sin depends_on del `db` local: el despliegue real usa la BD unificada y
    # el pool de la app es lazy con reintentos. Para un stack standalone, el
    # `db` se activa con `--profile standalone` y arranca en paralelo.
    volumes:
      # ZeroTier authtoken (opcional): permite que /api/zerotier/* hable con el
      # demonio del host. Si no existe el archivo, ZT no estará disponible.
      # Setup en host (una vez):
      #   sudo install -d -m 0755 /etc/lbs
      #   sudo install -m 0644 /var/lib/zerotier-one/authtoken.secret /etc/lbs/zerotier-token
      - /etc/lbs/zerotier-token:/etc/lbs/zerotier-token:ro
    environment:
      DATABASE_URL:           postgresql://${DB_USER:-guia_app}:${DB_PASSWORD:-cambiame123}@127.0.0.1:${DB_EXTERNAL_PORT:-5432}/${DB_NAME:-guia_instalacion}
      SECRET_KEY:             ${SECRET_KEY:?SECRET_KEY required in .env}
      APP_HOST:               0.0.0.0
      APP_PORT:               ${APP_PORT:-5000}
      LOG_LEVEL:              ${LOG_LEVEL:-INFO}
      # --- Polling ---
      POLL_INTERVAL:           ${POLL_INTERVAL:-2}
      MODBUS_POLL_INTERVAL:    ${MODBUS_POLL_INTERVAL:-2}
      MODBUS_POLL_WORKERS:     ${MODBUS_POLL_WORKERS:-32}
      MODBUS_STATUS_INTERVAL_S:  ${MODBUS_STATUS_INTERVAL_S:-6}
      MODBUS_ENV_INTERVAL_S:     ${MODBUS_ENV_INTERVAL_S:-30}
      MODBUS_MODULES_INTERVAL_S: ${MODBUS_MODULES_INTERVAL_S:-10}
      # --- Sample / cache ---
      METRICS_SAMPLE_INTERVAL_S: ${METRICS_SAMPLE_INTERVAL_S:-30}
      HISTORY_SAMPLE_INTERVAL_S: ${HISTORY_SAMPLE_INTERVAL_S:-30}
      SNMP_CLIENT_TTL_S:         ${SNMP_CLIENT_TTL_S:-300}
      # --- Timeouts de lectura (tolerantes a enlaces lentos: SIM/ZeroTier) ---
      SNMP_TIMEOUT_S:            ${SNMP_TIMEOUT_S:-5}
      SNMP_RETRIES:             ${SNMP_RETRIES:-2}
      MODBUS_TIMEOUT_S:         ${MODBUS_TIMEOUT_S:-8}
      # --- Retención ---
      HISTORY_RETENTION_DAYS: ${HISTORY_RETENTION_DAYS:-30}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-90}
      # --- Pools ---
      DB_POOL_MIN:            ${DB_POOL_MIN:-2}
      DB_POOL_MAX:            ${DB_POOL_MAX:-20}
      METRICS_POOL_MAX:       ${METRICS_POOL_MAX:-10}
      # Bootstrap admin (solo aplica si users está vacía).
      ADMIN_USERNAME:         ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-cambiame_al_primer_login}
      ADMIN_EMAIL:            ${ADMIN_EMAIL:-admin@lbs.com.mx}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${APP_PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ------------------------------------------------------------------ #
  # Cloudflare Tunnel — expone el portal en https://<tu-dominio>        #
  # Activar con:  docker compose --profile tunnel up -d                 #
  # ------------------------------------------------------------------ #
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ${PROJECT_NAME:-lbs}-tunnel
    restart: *restart
    network_mode: host
    depends_on:
      - portal
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_METRICS: 127.0.0.1:9113
    profiles: ["tunnel"]

volumes:
  pgdata:
    name: ${PROJECT_NAME:-lbs}_pgdata

networks:
  lbs-net:
    driver: bridge
    name:  ${PROJECT_NAME:-lbs}-net
