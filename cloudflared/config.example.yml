# cloudflared/config.example.yml
# ------------------------------------------------------------------
# Configuración alterna para correr cloudflared en modo "config-file"
# (en lugar de pegar un TUNNEL_TOKEN). Útil si manejas el túnel
# con `cloudflared tunnel create` y un cert.pem propio.
#
# Pasos:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create ups-monitor
#   3. Copia el credentials JSON a cloudflared/<TUNNEL_ID>.json
#   4. Renombra este archivo a config.yml y ajusta dominio + tunnel ID
#   5. Levanta cloudflared apuntando a /etc/cloudflared/config.yml
# ------------------------------------------------------------------

tunnel: REEMPLAZA-CON-TU-TUNNEL-ID
credentials-file: /etc/cloudflared/REEMPLAZA-CON-TU-TUNNEL-ID.json

# Métricas locales para Prometheus (opcional)
metrics: 127.0.0.1:9113

ingress:
  # Tráfico HTTP/Socket.IO al servicio de monitoreo
  - hostname: monitor.tudominio.com
    service: http://localhost:5000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  # Catch-all obligatorio
  - service: http_status:404
